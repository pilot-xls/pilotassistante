<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PilotAssistante</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/nav.css">
</head>
<body>
<div class="shell">

  <div class="bar">
    <div class="bar-logo"><div class="bar-logo-dot"></div>PilotAssistante</div>
    <span class="bar-ver">v0.13</span>
  </div>

  <div class="detail">
    <div class="detail-bg-num" id="d-bg">02</div>
    <div class="detail-inner">
      <div class="status-pill" id="d-pill">
        <span class="status-pill-dot" id="d-dot"></span>
        <span class="status-pill-txt" id="d-pill-txt">Module Activo</span>
      </div>
      <div class="detail-name" id="d-name">Logbook</div>
      <div class="detail-sub" id="d-sub">Smart logbook · EASA &amp; FAA</div>

      <div class="gauge-zone" id="gauge-zone"></div>

      <div class="detail-foot">
        <span class="detail-pos" id="d-pos">02 / 15</span>
        <button class="open-btn" id="open-btn" onclick="doOpen()">
          Open module
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2.5 6h7M6.5 3l3 3-3 3" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="grid-header">
    <span class="grid-label">All modules</span>
    <span class="grid-hint">tap to select</span>
  </div>
  <div class="grid" id="grid"></div>

  <div class="prog-wrap"><div class="prog-track"><div class="prog-fill" id="prog" style="width:13.3%"></div></div></div>

</div>
<script src="js/dashboard.js"></script>
<script src="js/nav.js"></script>
</body>
</html>
