<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#2825A0">
  <title>PilotAssistante — Logbook</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header class="header">
    <span class="logo">PilotAssistante</span>
    <div class="header-sep"></div>
    <nav class="nav">
      <a href="#" class="nav-link active">Logbook</a>
      <a href="#" class="nav-link">Schedule</a>
      <a href="#" class="nav-link">Docs</a>
      <a href="#" class="nav-link">Briefing</a>
    </nav>
  </header>

  <!-- ── STATS ──────────────────────────────────────────────── -->
  <section class="stats-section">
    <div class="stat-card">
      <span class="stat-label">Total</span>
      <span class="stat-value" id="stat-total">0:00</span>
    </div>
    <div class="stat-card accent">
      <span class="stat-label">PIC</span>
      <span class="stat-value" id="stat-pic">0:00</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">IFR</span>
      <span class="stat-value" id="stat-ifr">0:00</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Night</span>
      <span class="stat-value" id="stat-night">0:00</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Simulator</span>
      <span class="stat-value" id="stat-sim">0:00</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">This Month</span>
      <span class="stat-value" id="stat-month">0:00</span>
    </div>
  </section>

  <!-- ── MAIN ───────────────────────────────────────────────── -->
  <main class="main">
    <div class="list-header">
      <h1 class="list-title">Flight Logbook</h1>
      <button class="btn-add" id="btn-add-flight">+ Add Entry</button>
    </div>
    <div class="entries-list" id="entries-list"></div>
  </main>

  <!-- ── DRAWER OVERLAY ─────────────────────────────────────── -->
  <div class="drawer-overlay" id="drawer-overlay"></div>

  <!-- ── DRAWER FORM ────────────────────────────────────────── -->
  <aside class="drawer" id="drawer" aria-label="Add flight entry">
    <div class="drawer-header">
      <h2 class="drawer-title" id="drawer-title">New Flight</h2>
      <button class="drawer-close" id="drawer-close" aria-label="Close">✕</button>
    </div>

    <div class="type-toggle">
      <button class="type-btn active" id="type-flight">Flight</button>
      <button class="type-btn" id="type-sim">Simulator</button>
    </div>

    <form class="form" id="entry-form" novalidate>

      <!-- Date -->
      <div class="form-group">
        <label class="form-label" for="f-date">Date</label>
        <input class="form-input" type="date" id="f-date" required>
      </div>

      <!-- Flight-only fields -->
      <div class="flight-only">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-origin">Origin (ICAO)</label>
            <input class="form-input mono upper" type="text" id="f-origin" placeholder="LPPT" maxlength="4" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-dest">Destination (ICAO)</label>
            <input class="form-input mono upper" type="text" id="f-dest" placeholder="EGLL" maxlength="4" autocomplete="off">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-offblock">Off-Block (UTC)</label>
            <input class="form-input mono" type="time" id="f-offblock">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-onblock">On-Block (UTC)</label>
            <input class="form-input mono" type="time" id="f-onblock">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-aircraft-type">Aircraft Type</label>
            <input class="form-input upper" type="text" id="f-aircraft-type" placeholder="B737-800" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-reg">Registration</label>
            <input class="form-input mono upper" type="text" id="f-reg" placeholder="CS-TQA" autocomplete="off">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-engine">Engine</label>
            <select class="form-select" id="f-engine">
              <option value="ME">ME — Multi Engine</option>
              <option value="SE">SE — Single Engine</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-ops">Operations</label>
            <select class="form-select" id="f-ops">
              <option value="MP">MP — Multi Pilot</option>
              <option value="SP">SP — Single Pilot</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Total hours (always visible) -->
      <div class="form-group">
        <label class="form-label" for="f-total">Total Hours</label>
        <input class="form-input mono" type="text" id="f-total" placeholder="2:30 or 2.5" required autocomplete="off">
      </div>

      <!-- Flight-only hours & operations -->
      <div class="flight-only">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-day">Day Hours</label>
            <input class="form-input mono" type="text" id="f-day" placeholder="2:00" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-night">Night Hours</label>
            <input class="form-input mono" type="text" id="f-night" placeholder="0:30" autocomplete="off">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-ifr">IFR Hours</label>
            <input class="form-input mono" type="text" id="f-ifr" placeholder="2:10" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-vfr">VFR Hours</label>
            <input class="form-input mono" type="text" id="f-vfr" placeholder="0:00" autocomplete="off">
          </div>
        </div>

        <!-- Role -->
        <div class="form-group">
          <label class="form-label" for="f-role">Role</label>
          <select class="form-select" id="f-role">
            <option value="PIC">PIC — Pilot in Command</option>
            <option value="Co-Pilot">Co-Pilot (F/O)</option>
            <option value="Dual">Dual (Student)</option>
            <option value="Instructor">Instructor</option>
          </select>
        </div>

        <div class="form-group hidden" id="pic-name-group">
          <label class="form-label" for="f-pic-name">PIC Name</label>
          <input class="form-input" type="text" id="f-pic-name" placeholder="Captain's full name">
        </div>

        <div class="form-group hidden" id="instructor-group">
          <label class="form-label" for="f-instructor">Instructor Name</label>
          <input class="form-input" type="text" id="f-instructor" placeholder="Instructor's full name">
        </div>

        <!-- Takeoffs & Landings -->
        <div class="form-section-label">Takeoffs & Landings</div>
        <div class="form-row four">
          <div class="form-group">
            <label class="form-label" for="f-to-day">T/O Day</label>
            <input class="form-input mono" type="number" id="f-to-day" min="0" value="0">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-to-night">T/O Night</label>
            <input class="form-input mono" type="number" id="f-to-night" min="0" value="0">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-ldg-day">LDG Day</label>
            <input class="form-input mono" type="number" id="f-ldg-day" min="0" value="0">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-ldg-night">LDG Night</label>
            <input class="form-input mono" type="number" id="f-ldg-night" min="0" value="0">
          </div>
        </div>

        <!-- Instrument Approaches -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-appr-num">Inst. Approaches</label>
            <input class="form-input mono" type="number" id="f-appr-num" min="0" value="0">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-appr-type">Approach Type</label>
            <select class="form-select" id="f-appr-type">
              <option value="">—</option>
              <option value="ILS CAT I">ILS CAT I</option>
              <option value="ILS CAT II">ILS CAT II</option>
              <option value="ILS CAT III">ILS CAT III</option>
              <option value="RNAV">RNAV (GNSS)</option>
              <option value="VOR">VOR</option>
              <option value="NDB">NDB</option>
              <option value="Visual">Visual</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Simulator-only fields -->
      <div class="sim-only hidden">
        <div class="form-group">
          <label class="form-label" for="f-fstd-type">FSTD Type</label>
          <select class="form-select" id="f-fstd-type">
            <option value="FFS">FFS — Full Flight Simulator</option>
            <option value="FTD">FTD — Flight Training Device</option>
            <option value="FNPT II MCC">FNPT II MCC</option>
            <option value="FNPT II">FNPT II</option>
            <option value="FNPT I">FNPT I</option>
            <option value="BITD">BITD</option>
          </select>
        </div>
      </div>

      <!-- Remarks (always visible) -->
      <div class="form-group">
        <label class="form-label" for="f-remarks">Remarks</label>
        <textarea class="form-textarea" id="f-remarks" rows="2" placeholder="ILS CAT I RWY 27L, night sector…"></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
        <button type="submit" class="btn-save">Save Entry</button>
      </div>

    </form>
  </aside>

  <script src="js/app.js"></script>
</body>
</html>
